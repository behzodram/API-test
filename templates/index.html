<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask API Monitor</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #111827;
            color: #fff;
        }

        header {
            background: #1f2937;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
        }

        header h2 {
            font-size: 20px;
        }

        #clearAll {
            background: #dc2626;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
        }

        #clearAll:hover {
            background: #b91c1c;
        }

        #container {
            padding: 15px;
        }

        .card {

            background: #1f2937;

            border-left: 4px solid #10b981;

            margin-bottom: 10px;

            border-radius: 7px;

            padding: 10px;

        }

        .top {

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-bottom: 5px;

        }

        .method {

            font-weight: bold;

            color: #22c55e;

        }

        .endpoint {

            color: #60a5fa;

        }

        .time {

            color: #9ca3af;

            font-size: 12px;

        }

        .remove {

            background: #ef4444;

            color: white;

            border: none;

            padding: 4px 10px;

            border-radius: 5px;

            cursor: pointer;

            font-size: 12px;

        }

        .remove:hover {

            background: #dc2626;

        }

        pre {

            background: #111827;

            color: #d1d5db;

            padding: 8px;

            border-radius: 5px;

            overflow: auto;

            font-size: 12px;

            margin-top: 7px;

            max-height: 130px;

        }
    </style>

</head>

<body>

    <header>

        <h2>📡 Flask API Monitor</h2>

        <button id="clearAll">
            Clear All
        </button>

    </header>

    <div id="container"></div>

    <script>

        Notification.requestPermission();

        const notifySound = new Audio("/static/notify.mp3");
        notifySound.preload = "auto";

        const container = document.getElementById("container");

        function beep() {

            notifySound.currentTime = 0;

            notifySound.play().catch(() => { });

        }

        function createCard(log) {

            const card = document.createElement("div");

            card.className = "card";

            card.innerHTML = `

    <div class="top">

        <div>

            <span class="method">${log.method}</span>

            |

            <span class="endpoint">${log.endpoint}</span>

        </div>

        <button class="remove">

            Remove

        </button>

    </div>

    <div class="time">

        ${log.time}

        |

        ${log.ip}

    </div>

    <pre>${JSON.stringify(log.body, null, 2)}</pre>

    `;

            card.querySelector(".remove").onclick = function () {

                card.remove();

            };

            container.prepend(card);

        }

        let latestId = 0;

        function loadLogs() {

            fetch("/logs")
                .then(r => r.json())
                .then(data => {

                    data.reverse().forEach(log => {

                        if (log.id > latestId) {

                            latestId = log.id;

                            createCard(log);

                            beep();

                            if (Notification.permission === "granted") {

                                new Notification("Yangi API So'rovi", {
                                    body: `${log.method} ${log.endpoint}`
                                });

                            }

                        }

                    });

                });

        }

        loadLogs();

        setInterval(loadLogs, 1000);

        document.getElementById("clearAll").onclick = function () {

            container.innerHTML = "";

        };

    </script>

</body>

</html>
