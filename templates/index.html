<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask API Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif
        }

        body {
            background: #111827;
            color: #fff
        }

        header {
            background: #1f2937;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap
        }

        h2 {
            font-size: 20px
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap
        }

        button {
            background: #dc2626;
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer
        }

        #container {
            padding: 15px
        }

        .card {
            background: #1f2937;
            border-left: 4px solid #10b981;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 6px
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .time {
            font-size: 12px;
            color: #aaa;
            margin-top: 4px
        }

        pre {
            background: #111827;
            padding: 8px;
            border-radius: 5px;
            margin-top: 8px;
            font-size: 12px;
            overflow: auto;
            max-height: 130px
        }

        .remove {
            background: #ef4444;
            padding: 4px 8px;
            font-size: 12px
        }
    </style>
</head>

<body>
    <header>
        <h2>📡 Flask API Monitor</h2>
        <div class="controls">
            <label><input type="checkbox" id="browserNotify" checked> Browser</label>
            <label><input type="checkbox" id="soundNotify" checked> Sound</label>
            <button id="testSound">Test</button>
            <button id="clearAll">Clear All</button>
        </div>
    </header>

    <div id="container"></div>

    <script>
        Notification.requestPermission();

        const browserNotify = document.getElementById("browserNotify");
        const soundNotify = document.getElementById("soundNotify");
        const container = document.getElementById("container");

        // let latestId = 0;
        let audioBuffer = null;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        async function loadSound() {
            try {
                const r = await fetch("/static/notify.mp3");
                const b = await r.arrayBuffer();
                audioBuffer = await audioCtx.decodeAudioData(b);
            } catch (e) { console.log(e); }
        }
        loadSound();

        async function unlockAudio() {
            if (audioCtx.state === "suspended") await audioCtx.resume();
        }
        document.addEventListener("click", unlockAudio, { once: true });
        document.addEventListener("keydown", unlockAudio, { once: true });

        function beep() {
            if (!soundNotify.checked || !audioBuffer) return;
            const src = audioCtx.createBufferSource();
            src.buffer = audioBuffer;
            src.connect(audioCtx.destination);
            src.start(0);
        }

        function notify(log) {
            if (browserNotify.checked && Notification.permission === "granted") {
                new Notification("Yangi API", {
                    body: `${log.method} ${log.endpoint}`
                });
            }
            beep();
        }

        function createCard(log) {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
    <div class="top">
      <div><b>${log.method}</b> | ${log.endpoint}</div>
      <button class="remove">Remove</button>
    </div>
    <div class="time">${log.time} | ${log.ip}</div>
    <pre>${JSON.stringify(log.body, null, 2)}</pre>`;
            card.querySelector(".remove").onclick = () => card.remove();
            container.prepend(card);
        }

        let latestId = 0;
        let initialized = false;

        function loadLogs(){

            fetch("/logs")

            .then(r=>r.json())

            .then(data=>{

                data.reverse().forEach(log=>{

                    if(log.id > latestId){

                        latestId = log.id;

                        createCard(log);

                        // Faqat sahifa yuklangandan keyingi loglar uchun
                        if(initialized){
                            notify(log);
                        }

                    }

                });

                initialized = true;

            });

        }
        loadLogs();
        setInterval(loadLogs, 1000);

        document.getElementById("clearAll").onclick = () => container.innerHTML = "";
        document.getElementById("testSound").onclick = () => beep();
    </script>
</body>

</html>
